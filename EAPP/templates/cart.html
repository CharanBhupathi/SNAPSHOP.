<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - SNAPSHOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cart.css') }}">
</head>
<body>
  <header>
    <div class="header-container">
      <h1>SNAPSHOP</h1>
      <a href="/" class="back-to-shop">Continue Shopping</a>
    </div>
  </header>
  
  <main>
    <div class="cart-container">
      <div id="empty-cart-message" class="empty-cart" style="display: none;">
        <p>Your cart is empty!</p>
        <a href="/" class="continue-shopping-btn">Continue Shopping</a>
      </div>
      
      <div id="cart-content" class="cart-content" style="display: none;">
        <h2>Your Cart</h2>
        <ul id="cart-items" class="cart-items">
          <!-- Cart items will be dynamically added here -->
        </ul>
        
        <div class="cart-summary">
          <div class="total-section">
            <strong>Total:</strong> 
            <span>₹<span id="total-price">0</span></span>
          </div>
          
          <div class="cart-actions">
            <button id="clear-cart-btn" class="btn btn-secondary">Clear Cart</button>
            <button id="checkout-btn" class="btn btn-primary">Proceed to Checkout</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 SNAPSHOP</p>
  </footer>

  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
