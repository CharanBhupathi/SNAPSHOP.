<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - SNAPSHOP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">
</head>
<body>
  <header>
    <h1>SNAPSHOP</h1>
    <a href="/cart" id="cart-icon-container">
      <i id="cart-icon" class="fas fa-shopping-cart"></i>
      <span id="cart-count" class="cart-count">0</span>
    </a> 
  </header>

  <main>
    <div id="products-container" class="products-container">
      {% for product in products %}
      <div class="product-card"  
           data-id="{{ product.Product_Id }}" 
           data-name="{{ product.Product_Name }}" 
           data-price="{{ product.Product_Price }}"
           data-category="{{ product.Category_Name }}"
           data-rating="{{ product.Product_Rating }}"
           data-details="{{ product.Product_Details }}">
        <img src="{{ product.image_url }}" alt="{{ product.Product_Name }}" class="product-image">
        <div class="product-details">
          <h3>{{ product.Product_Name }}</h3>
          <p>Price: ₹{{ product.Product_Price }}</p>
          <p>Rating: {{ product.Product_Rating }}☆</p>
        </div>
        <button class="add-to-cart-btn" title="Add to Cart">+</button>
      </div>
      {% endfor %}
    </div>
  </main>

  <!-- Product Details Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2 id="productName"></h2>
      <p id="productPrice"></p>
      <p id="productRating"></p>
      <div id="productDetails"></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 SNAPSHOP.</p>
  </footer>

  <script src="{{ url_for('static', filename='js/products.js') }}"></script>
</body>
</html>
